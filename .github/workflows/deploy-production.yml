# ========================================================
# GitHub Actions CD — Deploy to Production
# ========================================================
# Triggers: manual dispatch only (with optional rollback)
# Requires: approval from environment protection rules
# ========================================================

name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (defaults to latest staging)'
        required: false
        default: 'staging'
        type: string
      rollback_tag:
        description: 'Rollback to specific tag (leave empty for normal deploy)'
        required: false
        default: ''
        type: string
      skip_backup:
        description: 'Skip database backup before deploy'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false  # Never cancel production deploys

    steps:
      - uses: actions/checkout@v4

      - name: Determine deploy tag
        id: tag
        run: |
          if [ -n "${{ inputs.rollback_tag }}" ]; then
            echo "tag=${{ inputs.rollback_tag }}" >> $GITHUB_OUTPUT
            echo "🔄 Rolling back to: ${{ inputs.rollback_tag }}"
          else
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
            echo "🚀 Deploying: ${{ inputs.image_tag }}"
          fi

      # ── Pre-deploy: Database Backup ──
      - name: Database backup
        if: ${{ !inputs.skip_backup }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -e
            cd /opt/unihr
            echo "📦 Creating pre-deploy backup..."
            bash scripts/backup.sh --direct
            echo "✅ Backup complete"

      # ── Deploy ──
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -Eeuo pipefail
            cd /opt/unihr
            TAG="${{ steps.tag.outputs.tag }}"

            echo "🏷️ Deploying tag: $TAG"

            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            PREV_BACKEND_IMAGE="$(docker inspect -f '{{.Config.Image}}' "$(docker compose -f docker-compose.prod.yml ps -q web)" 2>/dev/null || true)"
            PREV_FRONTEND_IMAGE="$(docker inspect -f '{{.Config.Image}}' "$(docker compose -f docker-compose.prod.yml ps -q frontend)" 2>/dev/null || true)"
            PREV_ADMIN_FRONTEND_IMAGE="$(docker inspect -f '{{.Config.Image}}' "$(docker compose -f docker-compose.prod.yml ps -q admin-frontend)" 2>/dev/null || true)"
            PREV_ADMIN_API_IMAGE="$(docker inspect -f '{{.Config.Image}}' "$(docker compose -f docker-compose.prod.yml ps -q admin-api)" 2>/dev/null || true)"

            cat > /tmp/unihr-predeploy-images.env <<EOF
            BACKEND_IMAGE=${PREV_BACKEND_IMAGE}
            FRONTEND_IMAGE=${PREV_FRONTEND_IMAGE}
            ADMIN_FRONTEND_IMAGE=${PREV_ADMIN_FRONTEND_IMAGE}
            ADMIN_API_IMAGE=${PREV_ADMIN_API_IMAGE}
            EOF

            export BACKEND_IMAGE="${{ env.IMAGE_PREFIX }}/backend:${TAG}"
            export FRONTEND_IMAGE="${{ env.IMAGE_PREFIX }}/frontend:${TAG}"
            export ADMIN_FRONTEND_IMAGE="${{ env.IMAGE_PREFIX }}/admin-frontend:${TAG}"
            export ADMIN_API_IMAGE="${{ env.IMAGE_PREFIX }}/admin-api:${TAG}"

            # Save current image digests for rollback reference
            docker compose -f docker-compose.prod.yml images --format json > /tmp/pre-deploy-images.json 2>/dev/null || true

            # Pull specific tag
            docker compose -f docker-compose.prod.yml pull web worker frontend admin-frontend admin-api

            # Rolling restart
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Health check with retries
            for i in $(seq 1 6); do
              sleep 10
              if curl -sf http://localhost:8000/health; then
                echo ""
                echo "✅ Health check passed on attempt $i"
                break
              fi
              if [ $i -eq 6 ]; then
                echo "❌ Health check failed after 60s"
                exit 1
              fi
              echo "⏳ Waiting for health check... ($i/6)"
            done

            # Run database migrations
            docker compose -f docker-compose.prod.yml exec -T web alembic upgrade head

            # Clean up
            docker image prune -f

            echo "✅ Production deployment complete: $TAG"

      # ── Post-deploy Smoke Test ──
      - name: Smoke test
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -e
            echo "🔍 Running smoke tests..."

            # API health
            curl -sf http://localhost:8080/health | grep -q '"status":"ok"'
            echo "  ✅ API health OK"

            # Frontend loads
            curl -sf -o /dev/null -w "%{http_code}" http://localhost:80/ | grep -q "200"
            echo "  ✅ Frontend OK"

            # Admin loads
            curl -sf -o /dev/null -w "%{http_code}" http://localhost:80/login | grep -q "200"
            echo "  ✅ Admin frontend OK"

            echo "✅ All smoke tests passed"

      - name: Auto rollback on failure
        if: ${{ failure() && inputs.rollback_tag == '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -Eeuo pipefail
            cd /opt/unihr

            if [ ! -f /tmp/unihr-predeploy-images.env ]; then
              echo "No pre-deploy image snapshot found; cannot auto-rollback."
              exit 1
            fi

            . /tmp/unihr-predeploy-images.env

            if [ -z "${BACKEND_IMAGE}" ] || [ -z "${FRONTEND_IMAGE}" ] || [ -z "${ADMIN_FRONTEND_IMAGE}" ] || [ -z "${ADMIN_API_IMAGE}" ]; then
              echo "Pre-deploy image snapshot is incomplete; cannot auto-rollback."
              exit 1
            fi

            echo "Auto-rollback to previous image set"
            export BACKEND_IMAGE FRONTEND_IMAGE ADMIN_FRONTEND_IMAGE ADMIN_API_IMAGE
            docker compose -f docker-compose.prod.yml pull web worker frontend admin-frontend admin-api
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            for i in $(seq 1 6); do
              sleep 10
              if curl -sf http://localhost:8000/health; then
                echo ""
                echo "Rollback health check passed on attempt $i"
                break
              fi
              if [ $i -eq 6 ]; then
                echo "Rollback health check failed after 60s"
                exit 1
              fi
            done

      # ── Summary ──
      - name: Deployment summary
        run: |
          echo "## 🚀 Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** ${{ steps.tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Rollback:** ${{ inputs.rollback_tag || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Backup:** ${{ inputs.skip_backup && 'Skipped' || 'Created' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
